name: zyntune
description: "Zyntune - Music Practice App"
publish_to: 'none'
version: 2.4.4+21

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  audioplayers: ^6.0.0
  pitch_detector_dart: ^0.0.4
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9
  record: ^6.0.0
  path_provider: ^2.1.2
  in_app_purchase: ^3.2.3
  screenshot: ^3.0.0
  share_plus: ^13.1.0
  in_app_review: ^2.0.12
  home_widget: ^0.9.2
  confetti: ^0.8.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7
  firebase_messaging: ^16.3.0
  onesignal_flutter: ^5.5.8
  http: ^1.6.0
  cloud_functions: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6200EA"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#6200EA"
  color_dark: "#6200EA"
  image: assets/icon/icon.png
  android_gravity: center
  ios_content_mode: center
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icon/
    - assets/audio/alert.wav